name: Test basic upload inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create test file to upload
        run: |
          mkdir -p /tmp/upload-test
          echo "hello world" > /tmp/upload-test/test.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          project_id: 'my-test-project'
          path: '/tmp/upload-test/test.txt'
          destination: 'my-test-bucket/uploads'
          gzip: 'false'
          resumable: 'false'
          parent: 'false'
          process_gcloudignore: 'false'
      - name: Assert action ran (may fail due to no GCS credentials)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail without real GCS credentials
          # but we verify it was invoked with the correct inputs
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked with path, destination, and project_id inputs"
