name: Test glob, headers, and predefinedAcl inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create test files for glob upload
        run: |
          mkdir -p /tmp/glob-upload-test
          echo "file one" > /tmp/glob-upload-test/file1.txt
          echo "file two" > /tmp/glob-upload-test/file2.txt
          echo "not a txt" > /tmp/glob-upload-test/file3.log
      - id: action
        uses: .
        continue-on-error: true
        with:
          project_id: 'my-test-project'
          path: '/tmp/glob-upload-test'
          destination: 'my-test-bucket/glob-uploads'
          glob: '*.txt'
          headers: |-
            content-type: 'text/plain'
            x-goog-meta-custom-field: 'custom-value'
          predefinedAcl: 'projectPrivate'
          gzip: 'false'
          resumable: 'false'
          process_gcloudignore: 'false'
      - name: Assert action ran (may fail due to no GCS credentials)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail without real GCS credentials
          # but we verify it was invoked with glob, headers, and predefinedAcl inputs
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked with glob, headers, and predefinedAcl inputs"
